---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odf-console-reader
rules:
- apiGroups: [""]
  resources:
    - nodes
    - persistentvolumes
    - persistentvolumeclaims
    - events
    - namespaces
  verbs: ["get","list","watch"]

- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
    - csidrivers
    - volumeattachments
    - csinodes
  verbs: ["get","list","watch"]

- apiGroups: ["operators.coreos.com"]
  resources:
    - clusterserviceversions
    - subscriptions
    - installplans
    - operatorgroups
  verbs: ["get","list","watch"]

- apiGroups: ["ocs.openshift.io"]
  resources:
    - storageclusters
    - storageclients
    - ocsinitializations
  verbs: ["get","list","watch"]

- apiGroups: ["ceph.rook.io"]
  resources:
    - cephclusters
    - cephblockpools
    - cephfilesystems
    - cephobjectstores
    - cephobjectstoreusers
    - cephobjectrealms
    - cephobjectzonegroups
    - cephobjectzones
    - cephnfses
    - cephfilesystemsubvolumegroups
  verbs: ["get","list","watch"]

- apiGroups: ["noobaa.io"]
  resources:
    - noobaas
    - backingstores
    - bucketclasses
    - namespacestores
  verbs: ["get","list","watch"]

- apiGroups: ["objectbucket.io"]
  resources:
    - objectbuckets
    - objectbucketclaims
  verbs: ["get","list","watch"]
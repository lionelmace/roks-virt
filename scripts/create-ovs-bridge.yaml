---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: br-vpc
spec:
  desiredState:
    interfaces:
      - name: br-vpc
        description: A dedicated OVS bridge with a PCI eth1 as a port
        type: ovs-bridge
        state: up
        bridge:
          allow-extra-patch-ports: true
          options:
            stp: false
          port:
            - name: eth1